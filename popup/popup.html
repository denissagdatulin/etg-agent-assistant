<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETG Agent Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SCREEN A: Settings (first launch / gear icon)
       Header: [← Back]  Settings  [🌙] [EN|RU]
       ═══════════════════════════════════════════════ -->
  <div id="screen-settings" class="screen hidden">
    <div class="header">
      <button id="btn-back" class="btn-icon" aria-label="Back">
        <!-- Back arrow — injected by JS -->
      </button>
      <span class="header-title" id="lbl-settings-title">Settings</span>
      <div class="header-actions">
        <button id="btn-theme" class="btn-icon" aria-label="Toggle theme">
          <!-- Moon/sun icon — injected by JS based on current theme -->
        </button>
        <div class="lang-switch" role="group" aria-label="Language">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="field-group">
        <label class="field-label" for="api-key-input" id="lbl-api-key">API Key</label>
        <input
          type="password"
          id="api-key-input"
          class="field-input"
          placeholder="sk-••••••••••••••••••"
          autocomplete="off"
          spellcheck="false"
        />
        <a class="field-hint" id="lnk-api-hint" href="https://chat.etg.team" target="_blank">
          Get key at chat.etg.team
        </a>
      </div>

      <div class="field-group">
        <label class="field-label" for="team-select" id="lbl-team">Team</label>
        <select id="team-select" class="field-input">
          <option value="incidents" id="opt-incidents">Incidents</option>
          <option value="precheck" disabled id="opt-precheck">Precheck (coming soon)</option>
          <option value="modification" disabled id="opt-modification">Modification (coming soon)</option>
        </select>
      </div>

      <button id="btn-save-settings" class="btn btn-primary btn-full">
        <span id="lbl-btn-save">Save</span>
      </button>

      <div id="settings-status" class="status-msg hidden"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       SCREEN B: Main (working screen)
       Header: [ETG Agent Assistant]  [⚙]
       ═══════════════════════════════════════════════ -->
  <div id="screen-main" class="screen hidden">
    <div class="header">
      <span class="header-title">ETG Agent Assistant</span>
      <button id="btn-settings" class="btn-icon" aria-label="Settings">
        <!-- Settings gear — injected by JS -->
      </button>
    </div>

    <div class="team-bar">
      <span id="team-label">Team: Incidents</span>
    </div>

    <div class="content">
      <button id="btn-evaluate" class="btn btn-primary btn-full">
        <span id="lbl-btn-evaluate">Evaluate</span>
      </button>

      <!-- Progress block (hidden at rest) -->
      <div id="progress-block" class="progress-block hidden">
        <div class="progress-bar">
          <div class="progress-bar-fill"></div>
        </div>
        <div class="progress-info">
          <span id="progress-text" class="progress-text">Evaluating ticket...</span>
          <span id="progress-time" class="progress-time">~1 min</span>
        </div>
      </div>

      <!-- Duplicate confirmation block (hidden at rest) -->
      <div id="confirm-block" class="confirm-block hidden">
        <div id="confirm-message" class="confirm-text"></div>
        <div class="confirm-actions">
          <button id="btn-reevaluate" class="btn btn-secondary btn-sm">
            <span id="lbl-btn-reevaluate">Re-evaluate</span>
          </button>
          <button id="btn-confirm-cancel" class="btn btn-primary btn-sm">
            <span id="lbl-btn-confirm-cancel">Cancel</span>
          </button>
        </div>
      </div>

      <!-- Error block (hidden when no error) -->
      <div id="error-block" class="error-block hidden">
        <div id="error-message" class="error-text"></div>
        <button id="btn-retry" class="btn btn-secondary btn-sm">
          <span id="lbl-btn-retry">Try Again</span>
        </button>
      </div>

      <button id="btn-insert" class="btn btn-insert" disabled>
        <span id="lbl-btn-insert">Insert Score</span>
      </button>
    </div>

    <!-- Evaluation history (last 24h) — shown when evaluations exist -->
    <div id="history-section" class="history-section hidden">
      <div class="history-header">
        <span id="lbl-history-title">History (24h)</span>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       SCREEN U: Mandatory update required
       ═══════════════════════════════════════════════ -->
  <div id="screen-update" class="screen hidden">
    <div class="header">
      <span class="header-title">ETG Agent Assistant</span>
    </div>
    <div class="content content--center">
      <div class="update-icon">⚠</div>
      <div class="update-title" id="lbl-update-title">Update Required</div>
      <div class="update-subtitle" id="lbl-update-subtitle">Cannot work without updating.</div>
      <div id="update-changelog" class="update-changelog hidden"></div>
      <button id="btn-download-update" class="btn btn-primary btn-full">
        <span id="lbl-btn-update">↓ Download Update</span>
      </button>
      <div class="update-hint" id="lbl-update-hint">
        After downloading: unzip to same folder → Reload on chrome://extensions/
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
