<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETG Agent Assistant</title>
    <link rel="icon" href="/extension/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/extension/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/extension/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/extension/icon-512.png" />
    <style>
      :root {
        --bg: #f4f0e8;
        --paper: rgba(255, 252, 246, 0.92);
        --text: #1f2933;
        --muted: #5e6c76;
        --accent: #0d6b57;
        --accent-strong: #084c3f;
        --line: rgba(31, 41, 51, 0.12);
        --shadow: 0 24px 60px rgba(31, 41, 51, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(13, 107, 87, 0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(198, 145, 70, 0.16), transparent 30%),
          linear-gradient(160deg, #f8f4ec 0%, #eee6d6 100%);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        display: grid;
        gap: 28px;
        padding: 40px;
      }

      .hero-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(13, 107, 87, 0.09);
        color: var(--accent-strong);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .lang-switch {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 8px 12px;
        border-radius: 999px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .lang-btn.active {
        background: var(--accent);
        color: #fff;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 18px 0 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .action-stack {
        display: grid;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 20px;
        border-radius: 16px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(13, 107, 87, 0.16);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        color: var(--accent-strong);
        border-color: rgba(13, 107, 87, 0.18);
        background: rgba(255, 255, 255, 0.7);
      }

      .action-hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .meta {
        display: grid;
        gap: 12px;
        padding: 0 40px 32px;
      }

      .meta-item {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 14px;
      }

      .meta-item strong {
        color: var(--text);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        padding: 0 20px 20px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 24px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .panel p,
      .panel li {
        color: var(--muted);
        line-height: 1.55;
      }

      ol {
        margin: 0;
        padding-left: 18px;
      }

      .footer {
        padding: 0 40px 40px;
        color: var(--muted);
        font-size: 13px;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(31, 41, 51, 0.06);
        font-family: "SFMono-Regular", "SF Mono", Consolas, monospace;
        color: var(--text);
      }

      @media (max-width: 640px) {
        .hero-top {
          flex-direction: column;
          align-items: flex-start;
        }

        .hero, .meta, .footer {
          padding-left: 20px;
          padding-right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="hero">
          <div class="hero-top">
            <span class="eyebrow" id="eyebrow">ETG internal tool</span>
            <div class="lang-switch" aria-label="Language switch">
              <button class="lang-btn" type="button" data-lang="ru">RU</button>
              <button class="lang-btn" type="button" data-lang="en">EN</button>
            </div>
          </div>
          <div>
            <h1>ETG Agent Assistant</h1>
            <p class="lead" id="lead"></p>
          </div>
          <div class="actions">
            <a class="btn btn-primary" href="/extension/latest.zip" download id="download-link"></a>
            <div class="action-stack">
              <button class="btn btn-secondary" type="button" id="copy-extensions-link"></button>
              <div class="action-hint" id="copy-extensions-hint"></div>
            </div>
          </div>
        </div>

        <div class="meta">
          <div class="meta-item"><strong id="current-version-label"></strong> <span id="current-version"></span></div>
          <div class="meta-item"><strong id="current-changelog-label"></strong> <span id="current-changelog"></span></div>
        </div>

        <div class="grid">
          <section class="panel">
            <h2 id="install-title"></h2>
            <ol id="install-steps"></ol>
          </section>

          <section class="panel">
            <h2 id="update-title"></h2>
            <ol id="update-steps"></ol>
          </section>

          <section class="panel">
            <h2 id="auto-title"></h2>
            <p id="auto-copy"></p>
          </section>
        </div>
      </section>
    </main>

    <script>
      const TRANSLATIONS = {
        ru: {
          eyebrow: 'ETG internal tool',
          lead: 'Расширение-помощник для оценки качества работы сотрудников.',
          download: 'Скачать последнюю версию',
          copy: 'Скопировать chrome://extensions/',
          copyHint: 'Вставь адрес в строку браузера Chrome.',
          copyDone: 'Скопировано',
          copyDoneHint: 'Теперь вставь chrome://extensions/ в адресную строку Chrome.',
          copyFallback: 'Скопируй вручную',
          copyFallbackHint: 'Скопируй и открой вручную: chrome://extensions/',
          currentVersionLabel: 'Текущая версия:',
          currentVersionLoading: 'загружается...',
          currentVersionFailed: 'не удалось загрузить',
          currentChangelogLabel: 'Последнее изменение:',
          currentChangelogLoading: 'будет показано после загрузки',
          currentChangelogFailed: 'не удалось загрузить',
          currentChangelogEmpty: 'без описания',
          installTitle: 'Первая установка',
          installSteps: [
            'Скачайте архив и распакуйте его в постоянную папку, которую не будете удалять.',
            'Откройте <code>chrome://extensions/</code>.',
            'Включите <code>Developer mode</code>.',
            'Нажмите <code>Load unpacked</code> и выберите распакованную папку.'
          ],
          updateTitle: 'Как обновляться дальше',
          updateSteps: [
            'Если внутри расширения появилась плашка про обновление, скачайте новый архив по этой же странице.',
            'Распакуйте новую версию поверх той же папки или замените её содержимое.',
            'Вернитесь в <code>chrome://extensions/</code> и нажмите <code>Reload</code>.'
          ],
          autoTitle: 'Что обновляется само',
          autoCopy: 'База знаний, профили команд и релизная информация живут на сервере. Их можно менять без переустановки расширения.'
        },
        en: {
          eyebrow: 'ETG internal tool',
          lead: 'An assistant extension that helps evaluate employee performance quality.',
          download: 'Download latest version',
          copy: 'Copy chrome://extensions/',
          copyHint: 'Paste the address into the Chrome address bar.',
          copyDone: 'Copied',
          copyDoneHint: 'Now paste chrome://extensions/ into the Chrome address bar.',
          copyFallback: 'Copy manually',
          copyFallbackHint: 'Copy and open manually: chrome://extensions/',
          currentVersionLabel: 'Current version:',
          currentVersionLoading: 'loading...',
          currentVersionFailed: 'failed to load',
          currentChangelogLabel: 'Latest change:',
          currentChangelogLoading: 'will appear after loading',
          currentChangelogFailed: 'failed to load',
          currentChangelogEmpty: 'no description',
          installTitle: 'First installation',
          installSteps: [
            'Download the archive and extract it into a permanent folder you will not delete.',
            'Open <code>chrome://extensions/</code>.',
            'Enable <code>Developer mode</code>.',
            'Click <code>Load unpacked</code> and select the extracted folder.'
          ],
          updateTitle: 'How to update later',
          updateSteps: [
            'If the extension shows an update notice, download the new archive from this page.',
            'Extract the new version over the same folder or replace its contents.',
            'Return to <code>chrome://extensions/</code> and click <code>Reload</code>.'
          ],
          autoTitle: 'What updates automatically',
          autoCopy: 'The knowledge base, team profiles, and release metadata live on the server and can be updated without reinstalling the extension.'
        }
      };

      let currentLang = navigator.language?.toLowerCase().startsWith('ru') ? 'ru' : 'en';

      function renderList(targetId, items) {
        const list = document.getElementById(targetId);
        list.innerHTML = '';

        items.forEach((item) => {
          const li = document.createElement('li');
          li.innerHTML = item;
          list.appendChild(li);
        });
      }

      function applyTranslations() {
        const t = TRANSLATIONS[currentLang];

        document.getElementById('eyebrow').textContent = t.eyebrow;
        document.getElementById('lead').textContent = t.lead;
        document.getElementById('download-link').textContent = t.download;
        document.getElementById('copy-extensions-link').textContent = t.copy;
        document.getElementById('copy-extensions-hint').textContent = t.copyHint;
        document.getElementById('current-version-label').textContent = t.currentVersionLabel;
        document.getElementById('current-version').textContent = t.currentVersionLoading;
        document.getElementById('current-changelog-label').textContent = t.currentChangelogLabel;
        document.getElementById('current-changelog').textContent = t.currentChangelogLoading;
        document.getElementById('install-title').textContent = t.installTitle;
        document.getElementById('update-title').textContent = t.updateTitle;
        document.getElementById('auto-title').textContent = t.autoTitle;
        document.getElementById('auto-copy').textContent = t.autoCopy;

        renderList('install-steps', t.installSteps);
        renderList('update-steps', t.updateSteps);

        document.querySelectorAll('.lang-btn').forEach((button) => {
          button.classList.toggle('active', button.dataset.lang === currentLang);
        });
      }

      document.querySelectorAll('.lang-btn').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.dataset.lang === currentLang) return;
          currentLang = button.dataset.lang;
          applyTranslations();
          loadVersionInfo();
        });
      });

      const copyButton = document.getElementById('copy-extensions-link');
      const copyHint = document.getElementById('copy-extensions-hint');
      copyButton?.addEventListener('click', async () => {
        const target = 'chrome://extensions/';
        const t = TRANSLATIONS[currentLang];

        try {
          await navigator.clipboard.writeText(target);
          copyButton.textContent = t.copyDone;
          if (copyHint) copyHint.textContent = t.copyDoneHint;
        } catch (_) {
          copyButton.textContent = t.copyFallback;
          if (copyHint) copyHint.textContent = t.copyFallbackHint;
        }
      });

      function loadVersionInfo() {
        const t = TRANSLATIONS[currentLang];

        document.getElementById('current-version').textContent = t.currentVersionLoading;
        document.getElementById('current-changelog').textContent = t.currentChangelogLoading;

        fetch('/version.json', { cache: 'no-store' })
          .then((response) => response.ok ? response.json() : null)
          .then((data) => {
            if (!data) return;
            document.getElementById('current-version').textContent = data.version || t.currentVersionFailed;
            document.getElementById('current-changelog').textContent = pickLocalizedChangelog(data) || t.currentChangelogEmpty;
          })
          .catch(() => {
            document.getElementById('current-version').textContent = t.currentVersionFailed;
            document.getElementById('current-changelog').textContent = t.currentChangelogFailed;
          });
      }

      function pickLocalizedChangelog(data) {
        if (!data || typeof data !== 'object') return '';
        if (currentLang === 'ru' && typeof data.changelog_ru === 'string' && data.changelog_ru.trim()) {
          return data.changelog_ru.trim();
        }
        if (currentLang === 'en' && typeof data.changelog_en === 'string' && data.changelog_en.trim()) {
          return data.changelog_en.trim();
        }
        if (typeof data.changelog === 'string') {
          return data.changelog.trim();
        }
        return '';
      }

      applyTranslations();
      loadVersionInfo();
    </script>
  </body>
  </html>
